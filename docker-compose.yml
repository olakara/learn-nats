version: '3.8'

services:
  nats:
    image: nats:latest
    container_name: nats
    ports:
      - "4222:4222"  # Client port
      - "8222:8222"  # Monitoring/HTTP port
      - "6222:6222"  # Cluster port
    volumes:
      - nats-data:/data
    command: 
      - --jetstream
      - --store_dir=/data
      - --http_port=8222
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8222/varz"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - nats-network

volumes:
  nats-data:
    driver: local

networks:
  nats-network:
    driver: bridge
