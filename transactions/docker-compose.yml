services:
  # Jaeger all-in-one: OTLP receiver + storage + query UI, all in one
  # container. Fine for local dev; swap for a real collector/backend
  # (e.g. Tempo, or Jaeger with a separate storage backend) in production.
  jaeger:
    image: jaegertracing/all-in-one:1.60
    container_name: jaeger
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    ports:
      - "16686:16686"  # UI
      - "4317:4317"    # OTLP gRPC
      - "4318:4318"    # OTLP HTTP

  nats:
    image: nats:latest
    container_name: nats
    ports:
      - "4222:4222"  # Client port
      - "8222:8222"  # Monitoring/HTTP port
      - "6222:6222"  # Cluster port
    volumes:
      - nats-data:/data
    command: 
      - --jetstream
      - --store_dir=/data
      - --http_port=8222
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8222/varz"]
      interval: 10s
      timeout: 5s
      retries: 5
    # networks:
    #   - nats-network

volumes:
  nats-data:
    driver: local

# networks:
#   nats-network:
#     driver: bridge
